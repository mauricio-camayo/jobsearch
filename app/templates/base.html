<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobSearch{% if title %} — {{ title }}{% endif %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px;
         background: #f5f5f5; color: #1a1a1a; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Nav */
  nav { background: #1e293b; color: #f8fafc; padding: 0 20px; display: flex;
        align-items: center; gap: 0; height: 44px; }
  nav .brand { font-weight: 700; font-size: 15px; color: #f8fafc;
               margin-right: 24px; letter-spacing: .02em; }
  nav a { color: #94a3b8; padding: 0 12px; height: 44px; display: flex;
          align-items: center; font-size: 13px; transition: color .15s; }
  nav a:hover, nav a.active { color: #f8fafc; text-decoration: none; }
  nav a.active { border-bottom: 2px solid #3b82f6; }

  /* Layout */
  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  h2 { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #374151; }

  /* Flash messages */
  .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px;
           font-size: 13px; }
  .flash.ok  { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .flash.err { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

  /* Cards / panels */
  .card { background: #fff; border-radius: 8px; border: 1px solid #e5e7eb;
          padding: 16px; margin-bottom: 16px; }

  /* Status badge */
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px;
           font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .badge-shown       { background: #dbeafe; color: #1d4ed8; }
  .badge-applied     { background: #dcfce7; color: #166534; }
  .badge-interviewing{ background: #fef3c7; color: #92400e; }
  .badge-offer       { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
  .badge-rejected    { background: #fee2e2; color: #991b1b; }
  .badge-skipped     { background: #f3f4f6; color: #6b7280; }
  .badge-expired     { background: #f3f4f6; color: #9ca3af; }

  /* Fit% color */
  .fit-hi  { color: #16a34a; font-weight: 700; }
  .fit-mid { color: #d97706; font-weight: 600; }
  .fit-lo  { color: #9ca3af; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: #6b7280;
       text-transform: uppercase; letter-spacing: .04em;
       padding: 6px 10px; border-bottom: 2px solid #e5e7eb; }
  td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }

  /* Status section headers */
  .section-header { display: flex; align-items: center; gap: 10px;
                    padding: 10px 0; margin-top: 8px; }
  .section-count { background: #e5e7eb; color: #374151; border-radius: 10px;
                   padding: 1px 8px; font-size: 11px; font-weight: 700; }

  /* Inline forms */
  select, input[type="text"], input[type="url"], input[type="number"],
  textarea { font-size: 13px; padding: 4px 8px; border: 1px solid #d1d5db;
             border-radius: 4px; background: #fff; font-family: inherit; }
  select:focus, input:focus, textarea:focus { outline: 2px solid #3b82f6;
             outline-offset: 1px; }
  textarea { width: 100%; resize: vertical; }

  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px;
         border: none; border-radius: 5px; font-size: 13px; font-weight: 500;
         cursor: pointer; font-family: inherit; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-sm { padding: 3px 8px; font-size: 12px; }
  .btn-ghost { background: #f3f4f6; color: #374151; }
  .btn-danger { background: #fee2e2; color: #b91c1c; }

  /* Notes cell */
  .notes-text { color: #6b7280; font-size: 12px; max-width: 260px;
                white-space: pre-line; word-break: break-word; }

  /* Flags */
  .flag { display: inline-block; background: #fef3c7; color: #92400e;
          font-size: 10px; padding: 1px 5px; border-radius: 3px; margin: 1px; }
  .flag-warn { background: #fee2e2; color: #b91c1c; }
  .flag-star { background: #ecfdf5; color: #065f46; }

  /* Grid helpers */
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .col-2 { flex: 0 0 calc(50% - 8px); }
  .col-3 { flex: 0 0 calc(33.333% - 11px); }

  /* Form groups */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600;
                 color: #374151; margin-bottom: 4px; }
  .field small { color: #9ca3af; font-size: 11px; }

  /* Search results */
  .decision-saved     { border-left: 3px solid #16a34a; }
  .decision-skipped   { border-left: 3px solid #9ca3af; }
  .decision-resurfaced{ border-left: 3px solid #d97706; }

  /* Engines toggle */
  .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0;
            background: #d1d5db; border-radius: 20px; transition: .2s; }
  .slider::before { content: ""; position: absolute; height: 14px; width: 14px;
                    left: 3px; top: 3px; background: white; border-radius: 50%;
                    transition: .2s; }
  input:checked + .slider { background: #2563eb; }
  input:checked + .slider::before { transform: translateX(16px); }

  /* Profile skills grid */
  .skill-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .skill { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
           border-radius: 4px; padding: 2px 8px; font-size: 12px; }
  .domain { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0;
            border-radius: 4px; padding: 2px 8px; font-size: 12px; }

  /* Crawl spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 12px; height: 12px;
             border: 2px solid rgba(255,255,255,.4);
             border-top-color: #fff; border-radius: 50%;
             animation: spin .7s linear infinite;
             vertical-align: middle; }
  .spinner-dark { border-color: rgba(0,0,0,.15); border-top-color: #374151; }

  /* Wide-table scroll wrapper (#72) */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Interview-prep notes (#74) */
  dialog::backdrop { background: rgba(15, 23, 42, .5); }
  .prep-note { border-left: 3px solid #e5e7eb; }
  .prep-note-pinned { border-left: 3px solid #d97706; }
  .prep-body { overflow-wrap: break-word; word-break: break-word; }
  .prep-body h4 { font-size: 13px; margin: 8px 0 4px; color: #1e293b; overflow-wrap: break-word; word-break: break-word; }
  .prep-body h5 { font-size: 12px; margin: 8px 0 4px; color: #374151; overflow-wrap: break-word; word-break: break-word; }
  .prep-body p { font-size: 13px; line-height: 1.5; margin-bottom: 6px; overflow-wrap: break-word; word-break: break-word; }
  .prep-body ul, .prep-body ol { font-size: 13px; line-height: 1.5; margin: 0 0 6px 18px; overflow-wrap: break-word; word-break: break-word; }
  .prep-body li { margin-bottom: 2px; overflow-wrap: break-word; word-break: break-word; }
  .prep-body a { overflow-wrap: break-word; word-break: break-word; }
  .prep-body strong { color: #1e293b; }

  /* Responsive breakpoints (#72) */
  @media (max-width: 768px) {
    nav { flex-wrap: wrap; height: auto; padding: 8px 12px; row-gap: 6px; }
    nav .brand { margin-right: 12px; }
    nav a { padding: 0 8px; height: 34px; font-size: 12px; }
    nav > span { margin-left: 0 !important; width: 100%; justify-content: flex-end; }

    .page { padding: 16px 12px; }
    .card { padding: 12px; }

    .col-2, .col-3 { flex: 1 1 100%; }
  }

  @media (max-width: 480px) {
    .page { padding: 12px 8px; }
    .card { padding: 10px; }
    nav > span span[style*="color:#64748b"] { display: none; }
    table { font-size: 12px; }
    th, td { padding: 5px 6px; }

    .section-header { flex-wrap: wrap; row-gap: 6px; }
    .section-header > div { flex-basis: 100%; margin-left: 0 !important; }
  }
</style>
</head>
<body>
<nav>
  <span class="brand">JobSearch</span>
  {% if current_user %}
  <a href="/ui/dashboard" class="{{ 'active' if active == 'dashboard' }}">Dashboard</a>
  <a href="/ui/search"    class="{{ 'active' if active == 'search' }}">Search</a>
  <a href="/ui/profile"   class="{{ 'active' if active == 'profile' }}">Profile</a>
  <a href="/ui/blacklist" class="{{ 'active' if active == 'blacklist' }}">Blacklist</a>
  {% if current_user.is_admin %}
  <a href="/ui/engines"   class="{{ 'active' if active == 'engines' }}">Engines</a>
  <a href="/admin/users" class="{{ 'active' if active == 'admin' }}">Admin</a>
  {% endif %}
  <span style="margin-left:auto; display:flex; align-items:center; gap:12px;">
    <span style="color:#64748b; font-size:11px;">v{{ app_version }}</span>
    <span style="color:#94a3b8; font-size:12px;">{{ current_user.email }}</span>
    <form method="post" action="/logout" style="display:inline;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
      <button class="btn btn-ghost btn-sm" type="submit">Log out</button>
    </form>
  </span>
  {% endif %}
</nav>
<div class="page">
  {% if flash %}
    <div class="flash {{ flash_type or 'ok' }}">{{ flash }}</div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
